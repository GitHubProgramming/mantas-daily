<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prisijungimas</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #2B4D3F; color: #F7F5F2; font-family: system-ui, sans-serif;
       display: flex; align-items: center; justify-content: center;
       min-height: 100vh; text-align: center; padding: 2rem; }
.card { max-width: 320px; width: 100%; }
h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
p { opacity: 0.7; font-size: 0.95rem; margin-bottom: 2rem; }
.spinner { width: 40px; height: 40px; border: 3px solid rgba(247,245,242,0.2);
           border-top-color: #F7F5F2; border-radius: 50%;
           animation: spin 0.8s linear infinite; margin: 0 auto 1.5rem; }
@keyframes spin { to { transform: rotate(360deg); } }
.error { color: #ff6b6b; font-size: 0.9rem; margin-top: 1rem; display: none; }
</style>
</head>
<body>
<div class="card">
  <div class="spinner" id="spinner"></div>
  <h1>Mantas Daily</h1>
  <p>Prisijungiama su Google...</p>
  <div class="error" id="err"></div>
</div>
<script src="https://accounts.google.com/gsi/client" async></script>
<script>
const CLIENT_ID = '459795919837-qpkjb0f9js1jbr7lq5r2je9h6t0cbgj5.apps.googleusercontent.com';
const SCOPE = 'https://www.googleapis.com/auth/spreadsheets';
const params = new URLSearchParams(window.location.search);
const silent = params.get('silent') === '1';

function showError(msg) {
  document.getElementById('spinner').style.display = 'none';
  const el = document.getElementById('err');
  el.textContent = msg;
  el.style.display = 'block';
}

function sendToken(token, expiresIn) {
  // Android WebView intercepts this custom scheme URL
  window.location.href = 'discipline://token?access_token=' + encodeURIComponent(token)
    + '&expires_in=' + expiresIn;
}

function sendError(err) {
  if (silent) {
    window.location.href = 'discipline://token?error=' + encodeURIComponent(err);
  } else {
    showError('Klaida: ' + err);
  }
}

function initAndRequest() {
  const client = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPE,
    callback: (resp) => {
      if (resp.error) {
        sendError(resp.error);
      } else {
        sendToken(resp.access_token, resp.expires_in || 3600);
      }
    }
  });
  client.requestAccessToken({ prompt: silent ? '' : 'consent' });
}

// Wait for GIS script to load
function waitForGIS(tries) {
  if (window.google && google.accounts && google.accounts.oauth2) {
    initAndRequest();
  } else if (tries > 0) {
    setTimeout(() => waitForGIS(tries - 1), 300);
  } else {
    sendError('GIS nepavyko užkrauti');
  }
}
waitForGIS(30);
</script>
</body>
</html>
