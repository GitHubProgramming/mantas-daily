<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F0D38C"/>
      <stop offset="100%" stop-color="#9C7A2E"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="116" fill="#0B0B0B"/>

  <!-- glass outline -->
  <path d="M 192 150 L 320 150 L 320 180 L 256 250 L 320 320 L 320 362 L 192 362 L 192 320 L 256 250 L 192 180 Z"
        fill="none" stroke="url(#g)" stroke-width="4" stroke-linejoin="round" stroke-linecap="round"/>
  <line x1="170" y1="150" x2="342" y2="150" stroke="url(#g)" stroke-width="6" stroke-linecap="round"/>
  <line x1="170" y1="362" x2="342" y2="362" stroke="url(#g)" stroke-width="6" stroke-linecap="round"/>

  <!-- remaining sand: top bulb, 60% (60 of 100 years left) -->
  <polygon points="217.6,190 294.4,190 256,250" fill="url(#g)"/>

  <!-- already lived: bottom bulb, 40% (40 of 100 years passed) -->
  <polygon points="217.6,317.2 294.4,317.2 320,362 192,362" fill="url(#g)" opacity="0.55"/>

  <!-- falling stream -->
  <line x1="256" y1="252" x2="256" y2="312" stroke="url(#g)" stroke-width="3" stroke-linecap="round"/>
</svg>
