<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prisijungimas</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #2B4D3F; color: #F7F5F2; font-family: system-ui, sans-serif;
       display: flex; align-items: center; justify-content: center;
       min-height: 100vh; text-align: center; padding: 2rem; }
.card { max-width: 320px; width: 100%; }
h1 { font-size: 1.8rem; margin-bottom: 0.4rem; letter-spacing: 0.1em; }
p { opacity: 0.65; font-size: 0.9rem; margin-bottom: 2rem; }
.spinner { width: 36px; height: 36px; border: 3px solid rgba(247,245,242,0.2);
           border-top-color: #C8A84B; border-radius: 50%;
           animation: spin 0.8s linear infinite; margin: 0 auto 1.5rem; }
@keyframes spin { to { transform: rotate(360deg); } }
.err { color: #ff6b6b; font-size: 0.85rem; margin-top: 1rem; display: none; }
</style>
</head>
<body>
<div class="card">
  <div class="spinner" id="sp"></div>
  <h1>DISCIPLINE</h1>
  <p id="msg">Prisijungiama su Google...</p>
  <div class="err" id="err"></div>
</div>
<script src="https://accounts.google.com/gsi/client" async></script>
<script>
const CLIENT_ID = '459795919837-qpkjb0f9js1jbr7lq5r2je9h6t0cbgj5.apps.googleusercontent.com';
const SCOPE = 'https://www.googleapis.com/auth/spreadsheets';
const REDIRECT_URI = 'https://githubprogramming.github.io/mantas-daily/android-auth.html';

function done(token, exp) {
  document.getElementById('msg').textContent = 'Prisijungta!';
  window.location.href = 'lt.discipline.app://token?access_token='
    + encodeURIComponent(token) + '&expires_in=' + (exp || 3600);
}

function fail(e) {
  document.getElementById('sp').style.display = 'none';
  const el = document.getElementById('err');
  el.textContent = 'Klaida: ' + e;
  el.style.display = 'block';
}

// Check if Google redirected us back with a token in the URL hash
const hash = new URLSearchParams(location.hash.slice(1));
const existingToken = hash.get('access_token');
if (existingToken) {
  done(existingToken, parseInt(hash.get('expires_in') || '3600'));
} else {
  // Wait for GIS script then request token via redirect mode (no popup needed)
  function initAndRequest() {
    google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID,
      scope: SCOPE,
      ux_mode: 'redirect',
      redirect_uri: REDIRECT_URI,
      callback: function(r) {
        if (r.error) fail(r.error);
        else done(r.access_token, r.expires_in);
      }
    }).requestAccessToken({ prompt: '' });
  }

  function waitForGIS(tries) {
    if (window.google && google.accounts && google.accounts.oauth2) {
      initAndRequest();
    } else if (tries > 0) {
      setTimeout(function() { waitForGIS(tries - 1); }, 300);
    } else {
      fail('GIS nepavyko užkrauti. Patikrink interneto ryšį.');
    }
  }
  waitForGIS(40);
}
</script>
</body>
</html>
